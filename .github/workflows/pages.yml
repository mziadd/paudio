# Deploy web/ to GitHub Pages on every push to main.
# Site: https://mziadd.github.io/paudio/
#
# Optional: repo secret POCKET_AUDIO_WS_URL = wss://audio.yourdomain.com
# (injected into config.js at build time)

name: Deploy Web

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Write config.js
        env:
          WS_URL: ${{ secrets.POCKET_AUDIO_WS_URL }}
        run: |
          if [ -n "$WS_URL" ]; then
            printf '%s\n' "export const WS_URL = '$WS_URL';" "export const LAN_WS_PORT = 9000;" > web/config.js
          elif [ ! -f web/config.js ]; then
            cp web/config.example.js web/config.js
          fi

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: web

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
