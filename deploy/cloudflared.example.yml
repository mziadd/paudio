# Cloudflare Tunnel — exposes home pocket-audio-server (port 9000) to the internet.
# Docs: https://developers.cloudflare.com/cloudflare-one/connections/connect-apps/
#
# Setup (once):
#   brew install cloudflared
#   cloudflared tunnel login
#   cloudflared tunnel create pocket-audio
#   cloudflared tunnel route dns pocket-audio audio.yourdomain.com
#   cp deploy/cloudflared.example.yml ~/.cloudflared/config.yml
#   Edit tunnel ID and hostname below.
#
# Run (keep open while streaming):
#   cloudflared tunnel run pocket-audio
#
# Then set web/config.js:  WS_URL = 'wss://audio.yourdomain.com'

tunnel: YOUR_TUNNEL_ID
credentials-file: /Users/YOUR_USER/.cloudflared/YOUR_TUNNEL_ID.json

ingress:
  - hostname: audio.yourdomain.com
    service: http://localhost:9000
  - service: http_status:404
