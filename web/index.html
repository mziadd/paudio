<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="theme-color" content="#0e0f12" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="mobile-web-app-capable" content="yes" />
    <link rel="manifest" href="manifest.json" />
    <title>PocketAudio</title>
    <style>
    :root {
      --bg: #0e0f12;
      --panel: #16181d;
      --border: #262a31;
      --text: #e6e8eb;
      --muted: #8a8f99;
      --accent: #5b8def;
      --live: #29c46f;
      --error: #e85a5a;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: radial-gradient(1200px 600px at 50% -10%, #1a1d24, var(--bg) 60%);
      color: var(--text);
      padding: env(safe-area-inset-top) env(safe-area-inset-right)
               env(safe-area-inset-bottom) env(safe-area-inset-left);
    }
    .card {
      width: min(360px, 92vw);
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 28px;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      text-align: center;
    }
    h1 { margin: 0 0 6px; font-size: 22px; }
    .subtitle { margin: 0 0 24px; color: var(--muted); font-size: 14px; }
    #play {
      font-size: 17px;
      padding: 14px 20px;
      border: 0;
      border-radius: 10px;
      font: inherit;
      font-weight: 600;
      cursor: pointer;
      background: var(--accent);
      color: white;
      width: 100%;
    }
    #play:hover { filter: brightness(1.08); }
    #play:disabled { opacity: 0.5; cursor: default; }
    #play.active {
      background: var(--live);
      color: #0e0f12;
    }
    .status {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      margin-top: 22px;
      font-size: 14px;
      color: var(--muted);
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--muted);
    }
    .dot[data-kind="live"] { background: var(--live); }
    .dot[data-kind="busy"] { background: var(--accent); }
    .dot[data-kind="error"] { background: var(--error); }
    .meter {
      margin: 14px auto 0;
      max-width: 200px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    #meter-bar {
      height: 100%;
      width: 0%;
      background: var(--accent);
    }
    .volume-row {
      margin-top: 22px;
      text-align: left;
    }
    .volume-row label {
      font-size: 13px;
      color: var(--muted);
    }
    input[type="range"] {
      width: 100%;
      margin-top: 6px;
      accent-color: var(--accent);
    }
  </style>
  </head>
  <body>
    <main class="card">
      <h1>PocketAudio</h1>
      <p class="subtitle">Stream your computer speakers to this device.</p>

      <button type="button" id="play">Listen</button>

      <div class="status">
        <span id="status-dot" class="dot" data-kind="idle"></span>
        <span id="status">Ready</span>
      </div>

      <div class="meter" aria-hidden="true">
        <div id="meter-bar"></div>
      </div>

      <div class="volume-row">
        <label for="volume">Volume</label>
        <input id="volume" type="range" min="0" max="2" step="0.05"
          value="1.0" />
      </div>
    </main>

    <audio id="media-out" playsinline webkit-playsinline autoplay
      style="position:absolute;left:0;bottom:0;width:1px;height:1px;opacity:0;pointer-events:none;"></audio>

    <script type="module" src="player.js?v=40"></script>
  </body>
</html>
